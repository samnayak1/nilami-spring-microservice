spring.application.name=BID-SERVICE



spring.datasource.url=jdbc:postgresql://${POSTGRES_HOST}:5432/${POSTGRES_DB}
spring.datasource.username=${POSTGRES_USER}
spring.datasource.password=${POSTGRES_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

eureka.client.fetch-registry=true
eureka.instance.prefer-ip-address=true
eureka.client.service-url.defaultZone=${EUREKA_HOST}/eureka
eureka.instance.hostname=localhost
spring.cloud.discovery.enabled=true
server.port=8082


spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.flyway.baseline-on-migrate=true



spring.kafka.bootstrap-servers=${KAFKA_BROKER_SERVICE}


spring.kafka.properties.security.protocol=SASL_PLAINTEXT
spring.kafka.properties.sasl.mechanism=PLAIN


spring.kafka.properties.sasl.jaas.config=${KAFKA_CLIENT_JAAS_CONFIG}

spring.kafka.producer.acks=all
spring.kafka.producer.retries=3
spring.kafka.producer.properties.spring.json.trusted.packages=*


spring.kafka.producer.key-serializer=org.apache.kafka.common.serialization.StringSerializer
spring.kafka.producer.value-serializer=org.springframework.kafka.support.serializer.JsonSerializer


springdoc.api-docs.enabled=true
springdoc.swagger-ui.enabled=false


gateway.url=${GATEWAY_URL:http://localhost:8084}


management.endpoints.web.exposure.include=health,info,prometheus
management.endpoint.health.show-details=always

management.observations.key-values.application=${spring.application.name}


management.prometheus.metrics.export.enabled=true


management.tracing.sampling.probability=1.0

management.otlp.tracing.endpoint=http://otel-collector.monitoring.svc.cluster.local:4317

management.metrics.tags.application=${spring.application.name}




