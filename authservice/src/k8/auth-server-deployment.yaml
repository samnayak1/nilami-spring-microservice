apiVersion: apps/v1
kind: Deployment
metadata:
  name: auth-server
  namespace: default
spec:
  replicas: 1
  selector:
    matchLabels:
      app: auth-server
  template:
    metadata:
      labels:
        app: auth-server
    spec:
      containers:
        - name: auth-server
          image: samnayak1/auth-server:1.0.26
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8081

          resources:
            limits:
              memory: "768Mi"
              cpu: "500m"
            requests:
              memory: "512Mi"
              cpu: "250m"

          env:
            - name: SERVER_PORT
              value: "8081"
       

            - name: AUTH_SERVER_DB
              valueFrom:
                configMapKeyRef:
                  name: auth-service-config
                  key: AUTH_SERVER_DB
            - name: AUTH_SERVER_POSTGRES_HOST
              valueFrom:
                configMapKeyRef:
                  name: auth-service-config
                  key: AUTH_SERVER_POSTGRES_HOST

  

            
            - name: CATALOG_SERVICE_HOST
              valueFrom:
                configMapKeyRef:
                  name: auth-service-config
                  key: CATALOG_SERVICE_HOST

            - name: BID_SERVICE_HOST
              valueFrom:
                configMapKeyRef:
                  name: auth-service-config
                  key: BID_SERVICE_HOST

  
            - name: GATEWAY_URL
              valueFrom:
                configMapKeyRef:
                  name: auth-service-config
                  key: GATEWAY_URL

              


            - name: AUTH_SERVER_DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: auth-service-secrets
                  key: AUTH_SERVER_DB_PASSWORD
            - name: AUTH_SERVER_DB_USER
              valueFrom:
                secretKeyRef:
                  name: auth-service-secrets
                  key: AUTH_SERVER_DB_USER

            - name: JWT_ISSUER_URI
              valueFrom:
                secretKeyRef:
                  name: auth-service-secrets
                  key: JWT_ISSUER_URI

            - name: AWS_REGION
              valueFrom:
                secretKeyRef:
                  name: auth-service-secrets
                  key: AWS_REGION


            - name: AWS_COGNITO_USER_POOL_ID
              valueFrom:
                secretKeyRef:
                  name: auth-service-secrets
                  key: AWS_COGNITO_USER_POOL_ID


            - name: AWS_CLIENT_ID
              valueFrom:
                secretKeyRef:
                  name: auth-service-secrets
                  key: AWS_CLIENT_ID


            - name: AWS_CLIENT_SECRET
              valueFrom:
                secretKeyRef:
                  name: auth-service-secrets
                  key: AWS_CLIENT_SECRET

            - name: AWS_ACCESS_KEY
              valueFrom:
                secretKeyRef:
                  name: catalog-secret
                  key: AWS_ACCESS_KEY

            - name: AWS_SECRET_ACCESS_KEY
              valueFrom:
                secretKeyRef:
                  name: catalog-secret
                  key: AWS_SECRET_ACCESS_KEY

            

                
