apiVersion: apps/v1
kind: Deployment
metadata:
  name: keycloak
spec:
  replicas: 1
  selector:
    matchLabels:
      app: keycloak
  template:
    metadata:
      labels:
        app: keycloak
    spec:
      initContainers:
        - name: realm-template
          image: busybox
          envFrom:
            - secretRef:
                name: auth-service-secrets
          command:
            - sh
            - -c
            - |
              sed "s|\${KEYCLOAK_CLIENT_SECRET}|$KEYCLOAK_CLIENT_SECRET|g" \
              /input/initial-realm.json > /output/initial-realm.json
          volumeMounts:
            - name: realm-template
              mountPath: /input
            - name: realm-final
              mountPath: /output
          resources:
            requests:
              memory: "32Mi"
              cpu: "50m"
            limits:
              memory: "64Mi"
              cpu: "100m"

      containers:
        - name: keycloak
          image: quay.io/keycloak/keycloak:24.0.1
          args:
            - start
            - --import-realm  
            - --http-enabled=true
            - --hostname-strict-https=false
          ports:
            - containerPort: 8080
          env:
      
            - name: JAVA_OPTS_APPEND
              value: "-Xms256m -Xmx512m -XX:MetaspaceSize=96M -XX:MaxMetaspaceSize=256m"
            
       
            - name: KC_METRICS_ENABLED
              value: "false"
            - name: KC_HEALTH_ENABLED
              value: "true"
            
         
            - name: KC_CACHE
              value: "local"
            - name: KC_CACHE_STACK
              value: "kubernetes"
            
     
            - name: DB_VENDOR
              value: POSTGRES
            - name: DB_ADDR
              value: keycloak-db-rw
            - name: KC_HTTP_ENABLED
              value: "true"
            - name: KC_HOSTNAME_STRICT_HTTPS
              value: "false"
            - name: KC_PROXY
              value: edge
            - name: DB_DATABASE
              valueFrom:
                configMapKeyRef:
                  name: auth-service-config
                  key: KEYCLOAK_POSTGRES_DB
            - name: DB_USER
              valueFrom:
                configMapKeyRef:
                  name: auth-service-config
                  key: KEYCLOAK_POSTGRES_USER
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: auth-service-secrets
                  key: KEYCLOAK_POSTGRES_PASSWORD
            - name: KEYCLOAK_ADMIN
              valueFrom:
                secretKeyRef:
                  name: auth-service-secrets
                  key: KEYCLOAK_ADMIN
            - name: KEYCLOAK_ADMIN_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: auth-service-secrets
                  key: KEYCLOAK_ADMIN_PASSWORD
            - name: KC_HOSTNAME_STRICT
              valueFrom:
                configMapKeyRef:
                  name: auth-service-config
                  key: KC_HOSTNAME_STRICT
          

          resources:
            requests:
              memory: "512Mi"
              cpu: "250m"
            limits:
              memory: "768Mi"
              cpu: "500m"
          
    
          readinessProbe:
            httpGet:
              path: /health/ready
              port: 8080
            initialDelaySeconds: 60
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          
          livenessProbe:
            httpGet:
              path: /health/live
              port: 8080
            initialDelaySeconds: 90
            periodSeconds: 30
            timeoutSeconds: 5
            failureThreshold: 3
          
          volumeMounts:
            - name: realm-final
              mountPath: /opt/keycloak/data/import

      volumes:
        - name: realm-template
          configMap:
            name: keycloak-realm
        - name: realm-final
          emptyDir: {}