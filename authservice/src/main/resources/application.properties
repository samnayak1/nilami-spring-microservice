spring.application.name=AUTH-SERVICE
spring.datasource.url=jdbc:postgresql://${AUTH_SERVER_POSTGRES_HOST}:5432/${AUTH_SERVER_DB}
spring.datasource.username=${AUTH_SERVER_DB_USER}
spring.datasource.password=${AUTH_SERVER_DB_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver



spring.security.oauth2.resourceserver.jwt.issuer-uri=${JWT_ISSUER_URI}


aws.region=${AWS_REGION}
aws.cognito.userPoolId=${AWS_COGNITO_USER_POOL_ID}
aws.cognito.clientId=${AWS_CLIENT_ID}
aws.cognito.clientSecret=${AWS_CLIENT_SECRET}

spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect


spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.flyway.baseline-on-migrate=true






server.port=8081

springdoc.api-docs.enabled=true
springdoc.swagger-ui.enabled=false


gateway.url=${GATEWAY_URL:http://localhost:8084}

management.endpoints.web.exposure.include=health,info,prometheus,metrics
management.endpoint.health.show-details=always


management.prometheus.metrics.export.enabled=true


management.metrics.tags.application=${spring.application.name}
management.observations.key-values.application=${spring.application.name}


logging.pattern.level=%5p [${spring.application.name:},%X{traceId:-},%X{spanId:-}]


stripe.secret.key=${STRIPE_SECRET_KEY}