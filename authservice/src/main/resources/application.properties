spring.application.name=AUTH-SERVICE
spring.datasource.url=jdbc:postgresql://${AUTH_SERVER_POSTGRES_HOST}:5432/${AUTH_SERVER_DB}
spring.datasource.username=${AUTH_SERVER_DB_USER}
spring.datasource.password=${AUTH_SERVER_DB_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver


spring.security.oauth2.resourceserver.jwt.issuer-uri=http://keycloak:8080/realms/nilami-microservices-security-realm
keycloak.realm=${KEYCLOAK_REALM}

spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect


spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.flyway.baseline-on-migrate=true


eureka.instance.hostname=localhost

eureka.client.fetch-registry=true
eureka.instance.prefer-ip-address=true
eureka.client.service-url.defaultZone=${EUREKA_HOST}/eureka



server.port=8081

springdoc.api-docs.enabled=true
springdoc.swagger-ui.enabled=false