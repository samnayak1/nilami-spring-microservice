apiVersion: apps/v1
kind: Deployment
metadata:
  name: registry-service
spec:
  selector:
    matchLabels:
      app: registry-service
  template:
    metadata:
      labels:
        app: registry-service
    spec:
      containers:
      - name: registry-service
        image: registryservice:latest
        imagePullPolicy: Never
        resources:
          limits:
            memory: "1024Mi"
          requests: 
            memory: "768Mi"
        ports:
        - containerPort: 8761
