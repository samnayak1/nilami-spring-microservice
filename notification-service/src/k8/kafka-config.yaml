apiVersion: v1
kind: ConfigMap
metadata:
  name: kafka-config
  namespace: kafka

  # add ,1@kafka-1.kafka-headless:9093,2@kafka-2.kafka-headless:9093 for kafka replicas
  # and change the values for the below items
    # num.partitions
    # default.replication.factor
    # min.insync.replicas
data:
  server.properties.template: |
    process.roles=broker,controller
    node.id=${BROKER_ID}

    controller.quorum.voters=0@kafka-0.kafka-headless:9093
    controller.listener.names=CONTROLLER


    listeners=SASL_PLAINTEXT://:9092,CONTROLLER://:9093
    advertised.listeners=SASL_PLAINTEXT://${POD_NAME}.kafka-headless.kafka.svc.cluster.local:9092
    inter.broker.listener.name=SASL_PLAINTEXT

    listener.security.protocol.map=CONTROLLER:PLAINTEXT,SASL_PLAINTEXT:SASL_PLAINTEXT


    sasl.enabled.mechanisms=PLAIN
    sasl.mechanism.inter.broker.protocol=PLAIN




    controller.listener.security.protocol.map=CONTROLLER:PLAINTEXT

    log.dirs=/var/lib/kafka/data

    num.partitions=1
    default.replication.factor=1
    min.insync.replicas=1
    
    offsets.topic.replication.factor=1
    transaction.state.log.replication.factor=1
    transaction.state.log.min.isr=1
    

    auto.create.topics.enable=true