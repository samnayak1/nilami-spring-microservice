apiVersion: apps/v1
kind: Deployment
metadata:
  name: websocket-service-deployment
  labels:
    app: websocket-service
spec:
  replicas: 1
  selector:
    matchLabels:
      app: websocket-service
  template:
    metadata:
      labels:
        app: websocket-service
    spec:
      containers:
        - name: websocket-service
          image: samnayak1/websocket-server:1.0.10
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 3001
          env:
            - name: PORT
              value: "3001"

            - name: KAFKA_BROKER

              valueFrom:
                configMapKeyRef:
                  name: websocket-service-config
                  key: KAFKA_BROKER


            - name: KAFKA_SASL_MECHANISM
              valueFrom:
                configMapKeyRef:
                  name: websocket-service-config
                  key: KAFKA_SASL_MECHANISM
            - name: HOST_NAME
              valueFrom:
                configMapKeyRef:
                  name: websocket-service-config
                  key: HOST_NAME
            - name: APP_NAME
              valueFrom:
                configMapKeyRef:
                  name: websocket-service-config
                  key: APP_NAME
            - name: KAFKA_USERNAME
              valueFrom:
                secretKeyRef:
                  name: kafka-consumer-credentials
                  key: username
            - name: KAFKA_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: kafka-consumer-credentials
                  key: password
            
            - name: REDIS_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: catalog-secret
                  key: valkey-password

            - name: REDIS_HOST
              value: my-valkey

            


                
                    


          resources:
            limits:
              memory: "768Mi"
              cpu: "500m"
            requests:
              memory: "512Mi"
              cpu: "250m"

