apiVersion: apps/v1
kind: Deployment
metadata:
  name: websocket-service-deployment
  labels:
    app: websocket-service
spec:
  replicas: 1
  selector:
    matchLabels:
      app: websocket-service
  template:
    metadata:
      labels:
        app: websocket-service
    spec:
      containers:
        - name: websocket-service
          image: websocket-server:latest
          imagePullPolicy: Never
          ports:
            - containerPort: 3001
          env:
            - name: PORT
              value: "3001"

            - name: KAFKA_BROKER

              valueFrom:
                configMapKeyRef:
                  name: websocket-service-config
                  key: KAFKA_BROKER
            - name: EUREKA_HOST
              valueFrom:
                configMapKeyRef:
                  name: websocket-service-config
                  key: EUREKA_HOST
              

            - name: KAFKA_SASL_MECHANISM
              valueFrom:
                configMapKeyRef:
                  name: websocket-service-config
                  key: KAFKA_SASL_MECHANISM
            - name: KAFKA_USERNAME
              valueFrom:
                secretKeyRef:
                  name: kafka-consumer-credentials
                  key: username
            - name: KAFKA_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: kafka-consumer-credentials
                  key: password


          resources:
            limits:
              memory: "768Mi"
              cpu: "500m"
            requests:
              memory: "512Mi"
              cpu: "250m"

          readinessProbe:
            httpGet:
              path: /actuator/health
              port: 3001
            initialDelaySeconds: 15
            periodSeconds: 10
