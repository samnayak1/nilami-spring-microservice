apiVersion: v1
kind: ConfigMap
metadata:
  name: postgres-custom-config
data:
  custom-pg_hba.conf: |
    # Custom pg_hba.conf
    local   all             all                                     trust
    host    all             all             0.0.0.0/0               scram-sha-256
    host    replication     all             0.0.0.0/0               scram-sha-256