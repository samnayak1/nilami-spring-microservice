spring.application.name=CATALOG-SERVICE
spring.datasource.url=jdbc:postgresql://${POSTGRES_HOST}:5432/${POSTGRES_DB}
spring.datasource.username=${POSTGRES_USER}
spring.datasource.password=${POSTGRES_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect


spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.flyway.baseline-on-migrate=true


server.port=8085
aws.s3.access-key: ${AWS_ACCESS_KEY}
aws.s3.secret-key: ${AWS_SECRET_ACCESS_KEY}
aws.s3.region: ${AWS_BUCKET_REGION}
aws.s3.bucket-name: ${AWS_BUCKET_NAME}


springdoc.api-docs.enabled=true
springdoc.swagger-ui.enabled=false


gateway.url=${GATEWAY_URL:http://localhost:8084}


management.endpoints.web.exposure.include=health,info,prometheus,metrics
management.endpoint.health.show-details=always


management.prometheus.metrics.export.enabled=true


management.metrics.tags.application=${spring.application.name}
management.observations.key-values.application=${spring.application.name}


logging.pattern.level=%5p [${spring.application.name:},%X{traceId:-},%X{spanId:-}]




resilience4j.circuitbreaker.instances.bid-server-service.slidingWindowSize: 10
resilience4j.circuitbreaker.instances.bid-server-service.failureRateThreshold: 50
resilience4j.circuitbreaker.instances.bid-server-service.waitDurationInOpenState: 10s
resilience4j.circuitbreaker.instances.bid-server-service.permittedNumberOfCallsInHalfOpenState: 3

spring.data.redis.host=my-valkey
spring.data.redis.port=6379
spring.data.redis.password=${valkey-password}
spring.cache.type=redis