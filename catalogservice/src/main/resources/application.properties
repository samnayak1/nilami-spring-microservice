spring.application.name=CATALOG-SERVICE
spring.datasource.url=jdbc:postgresql://${POSTGRES_HOST}:5432/${POSTGRES_DB}
spring.datasource.username=${POSTGRES_USER}
spring.datasource.password=${POSTGRES_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect


spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.flyway.baseline-on-migrate=true

eureka.client.fetch-registry=true
eureka.instance.prefer-ip-address=true
eureka.client.service-url.defaultZone=${EUREKA_HOST}/eureka
eureka.instance.hostname=localhost

server.port=8085
aws.s3.access-key: ${AWS_ACCESS_KEY}
aws.s3.secret-key: ${AWS_SECRET_ACCESS_KEY}
aws.s3.region: ${AWS_BUCKET_REGION}
aws.s3.bucket-name: ${AWS_BUCKET_NAME}


springdoc.api-docs.enabled=true
springdoc.swagger-ui.enabled=false


gateway.url=${GATEWAY_URL:http://localhost:8084}


management.endpoints.web.exposure.include=health,info,prometheus

management.endpoint.health.show-details=always
management.observations.key-values.application=${spring.application.name}


management.prometheus.metrics.export.enabled=true


# Sends traces to OTel collector at the right endpoint
#  Tags metrics with application name






management.tracing.sampling.probability=1.0

management.otlp.metrics.export.url=http://otel-collector-opentelemetry-collector.monitoring.svc.cluster.local:4318/v1/metrics

management.otlp.tracing.endpoint=http://otel-collector-opentelemetry-collector.monitoring.svc.cluster.local:4318/v1/traces

management.metrics.tags.application=${spring.application.name}

logging.pattern.level=%5p [${spring.application.name:},%X{traceId:-},%X{spanId:-}]
